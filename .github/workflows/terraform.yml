name: CloudBox Enterprise CI/CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    # Definimos tus variables aquí usando la convención TF_VAR_ de Terraform
    env:
      TF_VAR_project_name: "cloudbox"
      TF_VAR_aws_region: "us-east-1"
      TF_VAR_api_url: "https://4547pw0gbc.execute-api.us-east-1.amazonaws.com/dev"
      TF_VAR_user_pool_id: "us-east-1_t87WKjDDw"
      TF_VAR_client_id: "6v0gclhlnjdspuf6rlaed3b2ud"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Format 
        run: terraform fmt -check 

      - name: Terraform Validate 
        run: terraform validate 

      - name: Terraform Plan 
        run: terraform plan -lock=false

      - name: Terraform Apply 
        run: terraform apply -auto-approve -lock=false